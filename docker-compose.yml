services:
  postgres:
    image: postgres:16-alpine
    container_name: gg-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gg_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - gg_erp_postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gg_erp']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gg_erp_postgres_data:
