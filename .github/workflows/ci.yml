name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DB_DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma schema integrity
        run: npm run db:schema:check

      - name: Prisma migration integrity
        run: npm run db:migrations:check

      - name: Bootstrap scaffold integrity
        run: npm run bootstrap:check
