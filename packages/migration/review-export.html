<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopMonkey Export Review</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3348;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c8cff;
    --accent2: #4ecdc4;
    --green: #4caf87;
    --orange: #e8a84c;
    --red: #e05c5c;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── Header ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .meta { color: var(--text2); font-size: 13px; margin-left: auto; }

  /* ─── Drop zone ─── */
  .drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    border: 2px dashed var(--border);
    border-radius: 12px;
    margin: 40px;
    cursor: pointer;
    transition: border-color .2s;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); }
  .drop-zone h2 { color: var(--text2); font-weight: 500; margin-bottom: 8px; }
  .drop-zone p { color: var(--text2); font-size: 13px; }
  .drop-zone input { display: none; }

  /* ─── Dashboard ─── */
  .dashboard { display: none; padding: 24px; }
  .dashboard.active { display: block; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    min-width: 140px;
    cursor: pointer;
    transition: border-color .2s, transform .1s;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--accent); background: var(--surface2); }
  .stat-card .count { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

  /* Search & filters */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }
  .result-count { color: var(--text2); font-size: 13px; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead { background: var(--surface2); position: sticky; top: 0; }
  th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--text); }
  th .sort-arrow { margin-left: 4px; opacity: .4; }
  th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    max-width: 250px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tr:hover td { background: rgba(108, 140, 255, .04); }
  tr.deleted td { opacity: .45; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: rgba(76, 175, 135, .15); color: var(--green); }
  .badge-orange { background: rgba(232, 168, 76, .15); color: var(--orange); }
  .badge-red { background: rgba(224, 92, 92, .15); color: var(--red); }
  .badge-blue { background: rgba(108, 140, 255, .15); color: var(--accent); }
  .badge-gray { background: rgba(139, 144, 160, .15); color: var(--text2); }

  /* Detail panel */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
  }
  .detail-overlay.active { display: block; }
  .detail-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(600px, 80vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px;
    z-index: 201;
  }
  .detail-panel h2 { font-size: 18px; margin-bottom: 16px; }
  .detail-panel .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
  }
  .detail-panel .close-btn:hover { color: var(--text); }
  .detail-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 6px 12px;
    font-size: 13px;
  }
  .detail-grid .label { color: var(--text2); font-weight: 500; }
  .detail-grid .value { word-break: break-all; }
  .detail-grid .value.empty { color: var(--text2); font-style: italic; }

  /* Pagination */
  .pagination {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: var(--text2);
    font-size: 13px;
  }
  .pagination button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  .pagination button:hover { border-color: var(--accent); }
  .pagination button:disabled { opacity: .4; cursor: default; border-color: var(--border); }
</style>
</head>
<body>

<div class="header">
  <h1>ShopMonkey Export Review</h1>
  <div class="meta" id="headerMeta"></div>
</div>

<div class="drop-zone" id="dropZone">
  <h2>Drop ShopMonkey export JSON here</h2>
  <p>or click to browse</p>
  <input type="file" id="fileInput" accept=".json">
</div>

<div class="dashboard" id="dashboard">
  <div class="stats" id="statsBar"></div>
  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Search records...">
    <span class="result-count" id="resultCount"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="close-btn" id="closeDetail">&times;</button>
    <h2 id="detailTitle"></h2>
    <div class="detail-grid" id="detailGrid"></div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let data = null;
let activeEntity = null;
let filteredRows = [];
let currentPage = 0;
let sortCol = null;
let sortDir = 1;

// ─── Entity table configs ────────────────────────────────────────────
const entityConfigs = {
  customers: {
    columns: [
      { key: '_name', label: 'Name', get: r => [r.firstName, r.lastName].filter(Boolean).join(' ') || r.companyName || '—' },
      { key: 'companyName', label: 'Company' },
      { key: '_email', label: 'Email', get: r => r.emails?.[0]?.email || '—' },
      { key: '_phone', label: 'Phone', get: r => r.phoneNumbers?.[0]?.number || '—' },
      { key: '_location', label: 'Location', get: r => [r.city, r.state].filter(Boolean).join(', ') || '—' },
      { key: 'orderCount', label: 'Orders' },
      { key: 'vehicleCount', label: 'Vehicles' },
      { key: 'createdDate', label: 'Created', format: 'date' },
      { key: 'deleted', label: 'Status', format: 'deleted' },
    ],
    title: r => [r.firstName, r.lastName].filter(Boolean).join(' ') || r.companyName || r.id,
    searchFields: ['firstName', 'lastName', 'companyName', 'note'],
    searchNested: r => [r.emails?.[0]?.email, r.phoneNumbers?.[0]?.number].filter(Boolean),
  },
  vehicles: {
    columns: [
      { key: '_ymm', label: 'Vehicle', get: r => [r.year, r.make, r.model].filter(Boolean).join(' ') || '—' },
      { key: 'submodel', label: 'Submodel' },
      { key: 'vin', label: 'VIN' },
      { key: 'licensePlate', label: 'Plate' },
      { key: 'color', label: 'Color' },
      { key: '_owner', label: 'Owner', get: r => r.currentOwnerName || '—' },
      { key: 'odometer', label: 'Odometer' },
      { key: 'orderCount', label: 'Orders' },
      { key: 'createdDate', label: 'Created', format: 'date' },
      { key: 'deleted', label: 'Status', format: 'deleted' },
    ],
    title: r => [r.year, r.make, r.model].filter(Boolean).join(' ') || r.vin || r.id,
    searchFields: ['make', 'model', 'vin', 'licensePlate', 'currentOwnerName'],
  },
  orders: {
    columns: [
      { key: 'number', label: 'Order #' },
      { key: 'name', label: 'Name', get: r => r.coalescedName || r.name || '—' },
      { key: 'status', label: 'Status', format: 'orderStatus' },
      { key: 'generatedCustomerName', label: 'Customer' },
      { key: 'generatedVehicleName', label: 'Vehicle' },
      { key: '_total', label: 'Total', get: r => r.totalCostCents != null ? '$' + (r.totalCostCents / 100).toFixed(2) : '—' },
      { key: 'laborCents', label: 'Labor', get: r => r.laborCents != null ? '$' + (r.laborCents / 100).toFixed(2) : '—' },
      { key: 'partsCents', label: 'Parts', get: r => r.partsCents != null ? '$' + (r.partsCents / 100).toFixed(2) : '—' },
      { key: 'createdDate', label: 'Created', format: 'date' },
      { key: 'completedDate', label: 'Completed', format: 'date' },
    ],
    title: r => `#${r.number || '?'} — ${r.coalescedName || r.name || r.id}`,
    searchFields: ['number', 'name', 'coalescedName', 'generatedCustomerName', 'generatedVehicleName', 'status'],
  },
  users: {
    columns: [
      { key: '_name', label: 'Name', get: r => [r.firstName, r.lastName].filter(Boolean).join(' ') || '—' },
      { key: 'email', label: 'Email' },
      { key: 'phone', label: 'Phone' },
      { key: '_roles', label: 'Roles', get: r => r.userRoles?.map(ur => ur.roleName || ur.roleId).join(', ') || '—' },
      { key: 'active', label: 'Active', format: 'boolean' },
      { key: 'assignedTechnician', label: 'Technician', format: 'boolean' },
      { key: 'assignedServiceWriter', label: 'Writer', format: 'boolean' },
      { key: 'createdDate', label: 'Created', format: 'date' },
    ],
    title: r => [r.firstName, r.lastName].filter(Boolean).join(' ') || r.email || r.id,
    searchFields: ['firstName', 'lastName', 'email', 'phone'],
  },
  vendors: {
    columns: [
      { key: 'name', label: 'Name' },
      { key: '_contact', label: 'Contact', get: r => [r.contactFirstName, r.contactLastName].filter(Boolean).join(' ') || '—' },
      { key: 'contactEmail', label: 'Email' },
      { key: '_phone', label: 'Phone', get: r => r.contactPhone?.number || r.contactPhone || '—' },
      { key: '_location', label: 'Location', get: r => [r.city, r.state].filter(Boolean).join(', ') || '—' },
      { key: 'accountNumber', label: 'Account #' },
      { key: 'purchaseOrderCount', label: 'POs' },
      { key: 'createdDate', label: 'Created', format: 'date' },
      { key: 'deleted', label: 'Status', format: 'deleted' },
    ],
    title: r => r.name || r.id,
    searchFields: ['name', 'contactFirstName', 'contactLastName', 'contactEmail', 'accountNumber'],
  },
};

// ─── Format helpers ──────────────────────────────────────────────────
function formatCell(value, format) {
  if (format === 'date') {
    if (!value) return '<span style="color:var(--text2)">—</span>';
    const d = new Date(value);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  if (format === 'deleted') {
    return value
      ? '<span class="badge badge-red">deleted</span>'
      : '<span class="badge badge-green">active</span>';
  }
  if (format === 'boolean') {
    return value
      ? '<span class="badge badge-green">yes</span>'
      : '<span class="badge badge-gray">no</span>';
  }
  if (format === 'orderStatus') {
    const colors = {
      'Estimate': 'badge-blue',
      'In Progress': 'badge-orange',
      'Completed': 'badge-green',
      'Invoiced': 'badge-green',
      'Cancelled': 'badge-red',
    };
    const cls = colors[value] || 'badge-gray';
    return `<span class="badge ${cls}">${value || '—'}</span>`;
  }
  if (value == null || value === '') return '<span style="color:var(--text2)">—</span>';
  return String(value);
}

function getCellValue(row, col) {
  if (col.get) return col.get(row);
  return row[col.key];
}

function getCellSortValue(row, col) {
  const val = getCellValue(row, col);
  if (val == null || val === '—') return '';
  if (col.format === 'date') return val || '';
  return String(val).toLowerCase();
}

// ─── File loading ────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      data = JSON.parse(reader.result);
      initDashboard();
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── Dashboard init ──────────────────────────────────────────────────
function initDashboard() {
  dropZone.style.display = 'none';
  document.getElementById('dashboard').classList.add('active');

  // Header meta
  const exported = new Date(data.exportedAt);
  document.getElementById('headerMeta').textContent =
    `Exported ${exported.toLocaleString()} · Company ${data.companyId}`;

  // Stats cards
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = '';
  const entities = ['customers', 'vehicles', 'orders', 'users', 'vendors'];
  for (const entity of entities) {
    const arr = data[entity] || [];
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.dataset.entity = entity;
    card.innerHTML = `<div class="count">${arr.length}</div><div class="label">${entity}</div>`;
    card.addEventListener('click', () => selectEntity(entity));
    statsBar.appendChild(card);
  }

  // Default to customers
  selectEntity('customers');

  // Search
  document.getElementById('searchBox').addEventListener('input', () => {
    currentPage = 0;
    applyFilter();
    renderTable();
  });
}

// ─── Entity selection ────────────────────────────────────────────────
function selectEntity(entity) {
  activeEntity = entity;
  sortCol = null;
  sortDir = 1;
  currentPage = 0;
  document.getElementById('searchBox').value = '';

  document.querySelectorAll('.stat-card').forEach(c =>
    c.classList.toggle('active', c.dataset.entity === entity));

  applyFilter();
  renderTableHeader();
  renderTable();
}

function applyFilter() {
  const config = entityConfigs[activeEntity];
  const rows = data[activeEntity] || [];
  const query = document.getElementById('searchBox').value.toLowerCase().trim();

  if (!query) {
    filteredRows = [...rows];
  } else {
    filteredRows = rows.filter(r => {
      for (const f of (config.searchFields || [])) {
        if (r[f] && String(r[f]).toLowerCase().includes(query)) return true;
      }
      if (config.searchNested) {
        for (const v of config.searchNested(r)) {
          if (v && String(v).toLowerCase().includes(query)) return true;
        }
      }
      if (r.id && r.id.toLowerCase().includes(query)) return true;
      return false;
    });
  }

  applySorting();
  document.getElementById('resultCount').textContent =
    `${filteredRows.length} record${filteredRows.length !== 1 ? 's' : ''}`;
}

function applySorting() {
  if (sortCol == null) return;
  const config = entityConfigs[activeEntity];
  const col = config.columns[sortCol];
  filteredRows.sort((a, b) => {
    const va = getCellSortValue(a, col);
    const vb = getCellSortValue(b, col);
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
}

// ─── Table rendering ─────────────────────────────────────────────────
function renderTableHeader() {
  const config = entityConfigs[activeEntity];
  const thead = document.getElementById('tableHead');
  thead.innerHTML = '<tr>' + config.columns.map((col, i) => {
    const sorted = sortCol === i;
    const arrow = sorted ? (sortDir === 1 ? '▲' : '▼') : '▲';
    return `<th class="${sorted ? 'sorted' : ''}" data-col="${i}">
      ${col.label}<span class="sort-arrow">${arrow}</span>
    </th>`;
  }).join('') + '</tr>';

  thead.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const col = parseInt(th.dataset.col);
      if (sortCol === col) {
        sortDir *= -1;
      } else {
        sortCol = col;
        sortDir = 1;
      }
      applyFilter();
      renderTableHeader();
      renderTable();
    });
  });
}

function renderTable() {
  const config = entityConfigs[activeEntity];
  const tbody = document.getElementById('tableBody');
  const start = currentPage * PAGE_SIZE;
  const pageRows = filteredRows.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = pageRows.map(row => {
    const isDeleted = row.deleted;
    return `<tr class="${isDeleted ? 'deleted' : ''}" data-id="${row.id}">` +
      config.columns.map(col => {
        const val = getCellValue(row, col);
        return `<td title="${String(val ?? '').replace(/"/g, '&quot;')}">${formatCell(val, col.format)}</td>`;
      }).join('') + '</tr>';
  }).join('');

  // Click to show detail
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => showDetail(tr.dataset.id));
  });

  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  pag.innerHTML = `
    <button id="prevPage" ${currentPage === 0 ? 'disabled' : ''}>← Prev</button>
    <span>Page ${currentPage + 1} of ${totalPages}</span>
    <button id="nextPage" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
  `;
  document.getElementById('prevPage').addEventListener('click', () => { currentPage--; renderTable(); });
  document.getElementById('nextPage').addEventListener('click', () => { currentPage++; renderTable(); });
}

// ─── Detail panel ────────────────────────────────────────────────────
function showDetail(id) {
  const rows = data[activeEntity] || [];
  const row = rows.find(r => r.id === id);
  if (!row) return;

  const config = entityConfigs[activeEntity];
  document.getElementById('detailTitle').textContent = config.title(row);

  const grid = document.getElementById('detailGrid');
  grid.innerHTML = '';

  // Show all non-null fields
  const skipKeys = new Set(['meta', 'metadata', 'customFields', 'labels', 'bnplPrequalificationData']);
  for (const [key, value] of Object.entries(row)) {
    if (skipKeys.has(key)) continue;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = key;

    const val = document.createElement('div');
    val.className = 'value';

    if (value == null || value === '') {
      val.className = 'value empty';
      val.textContent = '—';
    } else if (Array.isArray(value)) {
      if (value.length === 0) {
        val.className = 'value empty';
        val.textContent = '(empty array)';
      } else if (typeof value[0] === 'object') {
        val.innerHTML = `<details><summary>${value.length} item${value.length !== 1 ? 's' : ''}</summary><pre style="font-size:11px;color:var(--text2);white-space:pre-wrap;margin-top:4px">${JSON.stringify(value, null, 2)}</pre></details>`;
      } else {
        val.textContent = value.join(', ');
      }
    } else if (typeof value === 'object') {
      val.innerHTML = `<details><summary>{...}</summary><pre style="font-size:11px;color:var(--text2);white-space:pre-wrap;margin-top:4px">${JSON.stringify(value, null, 2)}</pre></details>`;
    } else if (typeof value === 'boolean') {
      val.innerHTML = value
        ? '<span class="badge badge-green">true</span>'
        : '<span class="badge badge-gray">false</span>';
    } else if (key.endsWith('Date') && typeof value === 'string' && value.includes('T')) {
      val.textContent = new Date(value).toLocaleString();
    } else if (key.endsWith('Cents') && typeof value === 'number') {
      val.textContent = '$' + (value / 100).toFixed(2);
    } else {
      val.textContent = String(value);
    }

    grid.appendChild(label);
    grid.appendChild(val);
  }

  document.getElementById('detailOverlay').classList.add('active');
}

document.getElementById('closeDetail').addEventListener('click', closeDetail);
document.getElementById('detailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
}
</script>
</body>
</html>
