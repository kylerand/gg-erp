name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  pre_deploy_gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma schema integrity
        run: npm run db:schema:check

      - name: Prisma migration integrity
        run: npm run db:migrations:check

      - name: Bootstrap scaffold integrity
        run: npm run bootstrap:check

  deploy:
    needs: pre_deploy_gates
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    permissions:
      id-token: write   # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:schema:check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Build Lambda artifacts
        run: npm run build:lambdas

      - name: Package Lambda artifacts
        run: npm run package:lambdas

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "name_prefix=gg-erp-prod" >> $GITHUB_OUTPUT
            echo "tf_env=prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
            echo "name_prefix=gg-erp-dev" >> $GITHUB_OUTPUT
            echo "tf_env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Upload Lambda artifacts to S3
        run: |
          for zipfile in dist/lambdas/*.zip; do
            name=$(basename "$zipfile" .zip)
            aws s3 cp "$zipfile" "s3://${{ steps.env.outputs.name_prefix }}-lambda-artifacts/lambdas/${name}.zip"
            echo "✓ Uploaded ${name}.zip"
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.4.6'

      - name: Terraform Init
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform init
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}

      - name: Terraform Plan
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform plan -out=tfplan -detailed-exitcode
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}
          TF_VAR_work_orders_lambda_zip_path: "s3://${{ steps.env.outputs.name_prefix }}-lambda-artifacts/lambdas/work-orders-create.zip"
        continue-on-error: true
        id: plan

      - name: Terraform Apply
        if: steps.plan.outcome == 'success' || steps.plan.outputs.exitcode == '2'
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}
          TF_VAR_work_orders_lambda_zip_path: "s3://${{ steps.env.outputs.name_prefix }}-lambda-artifacts/lambdas/work-orders-create.zip"

      - name: Run database migrations
        run: npm run db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Smoke test - Health check
        run: |
          API_URL=$(cd infra/terraform/envs/${{ steps.env.outputs.tf_env }} && terraform output -raw api_base_url 2>/dev/null || echo "")
          if [ -z "$API_URL" ]; then
            echo "⚠️  API URL not available from Terraform output, skipping smoke test"
            exit 0
          fi
          echo "Running smoke test against: $API_URL"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$API_URL/planning/work-orders" \
            -H "Content-Type: application/json" \
            -H "X-Correlation-ID: smoke-test-$(date +%s)" \
            -d '{"title":"Smoke Test WO","description":"CD smoke test","customerId":"smoke-test-customer","vehicleId":"smoke-test-vehicle","assignedTechnicianId":"smoke-test-tech","scheduledStart":"2025-01-01T09:00:00Z","estimatedHours":1}' \
            2>&1)
          echo "Response code: $RESPONSE"
          if [[ "$RESPONSE" == "201" ]] || [[ "$RESPONSE" == "409" ]]; then
            echo "✅ Smoke test passed (status $RESPONSE)"
          else
            echo "❌ Smoke test failed (unexpected status $RESPONSE)"
            exit 1
          fi
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}
