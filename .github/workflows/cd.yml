name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      seed_inventory_master:
        description: 'Run inventory-master seed after migrations (opt-in)'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    # Only run Lambda CD when backend, infra, or shared packages change.
    # Frontend apps (web, floor-tech, training) are deployed by AWS Amplify
    # directly from the repo — no Lambda redeploy needed for them.
    paths:
      - 'apps/api/**'
      - 'apps/workers/**'
      - 'packages/**'
      - 'infra/**'
      - '.github/workflows/cd.yml'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pre_deploy_gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DB_DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma schema integrity
        run: npm run db:schema:check

      - name: Prisma migration integrity
        run: npm run db:migrations:check

      - name: Bootstrap scaffold integrity
        run: npm run bootstrap:check

  deploy:
    needs: pre_deploy_gates
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write   # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}
          role-duration-seconds: 7200

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:schema:check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Build Lambda artifacts
        run: npm run build:lambdas

      - name: Package Lambda artifacts
        run: npm run package:lambdas

      - name: Determine environment
        id: env
        run: |
          # Manual dispatch: use selected environment
          # Push to main: default to dev (change to prod when ready for production)
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [[ "$ENV" == "prod" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "name_prefix=gg-erp-prod" >> $GITHUB_OUTPUT
            echo "tf_env=prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
            echo "name_prefix=gg-erp-dev" >> $GITHUB_OUTPUT
            echo "tf_env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Upload Lambda artifacts to S3
        run: |
          for zipfile in apps/api/dist/*-lambda.zip; do
            name=$(basename "$zipfile" .zip)
            aws s3 cp "$zipfile" "s3://${{ steps.env.outputs.name_prefix }}-lambda-artifacts/lambdas/${name}.zip"
            echo "✓ Uploaded ${name}.zip"
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.4.6'

      - name: Terraform Init
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform init
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}

      - name: Import existing Cognito user groups
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: |
          USER_POOL_NAME="${TF_VAR_name_prefix}-user-pool"

          # Paginate through all user pools (each page returns at most 60)
          USER_POOL_ID=""
          NEXT_TOKEN=""
          while true; do
            PAGE=$(aws cognito-idp list-user-pools --max-results 60 \
              ${NEXT_TOKEN:+--next-token "$NEXT_TOKEN"} 2>/dev/null || echo "{}")
            USER_POOL_ID=$(echo "$PAGE" | jq -r --arg name "$USER_POOL_NAME" \
              '.UserPools[] | select(.Name==$name) | .Id' 2>/dev/null || echo "")
            if [ -n "$USER_POOL_ID" ]; then break; fi
            NEXT_TOKEN=$(echo "$PAGE" | jq -r '.NextToken // empty' 2>/dev/null || echo "")
            if [ -z "$NEXT_TOKEN" ]; then break; fi
          done

          if [ -z "$USER_POOL_ID" ]; then
            echo "User pool '$USER_POOL_NAME' not found — skipping Cognito group import"
            exit 0
          fi
          echo "Found user pool: $USER_POOL_ID"

          # Import every group that currently exists in AWS into Terraform state.
          # Groups absent from the Terraform config will produce a benign import error (suppressed).
          EXISTING_GROUPS=$(aws cognito-idp list-groups --user-pool-id "$USER_POOL_ID" \
            --query 'Groups[].GroupName' --output text 2>/dev/null || echo "")
          for group in $EXISTING_GROUPS; do
            terraform import -lock-timeout=120s "module.cognito.aws_cognito_user_group.roles[\"$group\"]" "${USER_POOL_ID}/${group}" \
              && echo "✓ Imported $group" || echo "↷ Skipped $group (not in config or already tracked in state)"
          done
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}

      - name: Reconcile orphan AWS resources into state
        # Heals the "terraform apply created the resource in AWS but exited
        # before saving state" failure mode. Walks Lambda functions, API Gateway
        # routes + integrations, and CloudWatch log groups that match this
        # deployment's name prefix and imports any that aren't already in state.
        # Safe to run repeatedly; no-op when state is clean.
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: python3 "${{ github.workspace }}/scripts/reconcile-aws-state.py"
        env:
          NAME_PREFIX: ${{ steps.env.outputs.name_prefix }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_MODULE_PATH: ${{ github.workspace }}/infra/terraform/modules/api-gateway-lambda/main.tf

      - name: Terraform Plan
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform plan -lock-timeout=120s -parallelism=30 -out=tfplan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}
          TF_VAR_work_orders_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/work-orders-lambda.zip"
          TF_VAR_customers_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/customers-lambda.zip"
          TF_VAR_inventory_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/inventory-lambda.zip"
          TF_VAR_tickets_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/tickets-lambda.zip"
          TF_VAR_attachments_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/attachments-lambda.zip"
          TF_VAR_sop_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/sop-lambda.zip"
          TF_VAR_accounting_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/accounting-lambda.zip"
          TF_VAR_migration_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/migration-lambda.zip"
          TF_VAR_identity_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/identity-lambda.zip"
          TF_VAR_communication_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/communication-lambda.zip"
          TF_VAR_audit_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/audit-lambda.zip"
          TF_VAR_sales_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/sales-lambda.zip"
          TF_VAR_copilot_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/copilot-lambda.zip"
          TF_VAR_scheduling_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/scheduling-lambda.zip"
          TF_VAR_workers_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/workers-lambda.zip"
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_qb_client_id: ${{ secrets.QB_CLIENT_ID }}
          TF_VAR_qb_client_secret: ${{ secrets.QB_CLIENT_SECRET }}
          TF_VAR_qb_redirect_uri: ${{ vars.QB_REDIRECT_URI || '' }}
          TF_VAR_qb_webhook_verifier_token: ${{ secrets.QB_WEBHOOK_VERIFIER_TOKEN }}
          TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
          TF_VAR_repository_url: "https://github.com/${{ github.repository }}"

      - name: Refresh AWS credentials before Apply
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}
          role-duration-seconds: 7200

      - name: Terraform Apply
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform apply -lock-timeout=120s -parallelism=30 -auto-approve tfplan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}
          TF_VAR_work_orders_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/work-orders-lambda.zip"
          TF_VAR_customers_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/customers-lambda.zip"
          TF_VAR_inventory_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/inventory-lambda.zip"
          TF_VAR_tickets_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/tickets-lambda.zip"
          TF_VAR_attachments_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/attachments-lambda.zip"
          TF_VAR_sop_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/sop-lambda.zip"
          TF_VAR_accounting_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/accounting-lambda.zip"
          TF_VAR_migration_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/migration-lambda.zip"
          TF_VAR_identity_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/identity-lambda.zip"
          TF_VAR_communication_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/communication-lambda.zip"
          TF_VAR_audit_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/audit-lambda.zip"
          TF_VAR_sales_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/sales-lambda.zip"
          TF_VAR_copilot_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/copilot-lambda.zip"
          TF_VAR_scheduling_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/scheduling-lambda.zip"
          TF_VAR_workers_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/workers-lambda.zip"
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_qb_client_id: ${{ secrets.QB_CLIENT_ID }}
          TF_VAR_qb_client_secret: ${{ secrets.QB_CLIENT_SECRET }}
          TF_VAR_qb_redirect_uri: ${{ vars.QB_REDIRECT_URI || '' }}
          TF_VAR_qb_webhook_verifier_token: ${{ secrets.QB_WEBHOOK_VERIFIER_TOKEN }}
          TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
          TF_VAR_repository_url: "https://github.com/${{ github.repository }}"

      - name: Run database migrations
        run: |
          python3 -c "
          import os, json, subprocess, glob

          migration_dir = 'packages/db/prisma/migrations'
          lambda_name = os.environ['MIGRATION_LAMBDA_NAME']
          region = 'us-east-2'

          dirs = sorted(glob.glob(os.path.join(migration_dir, '*/')))
          print(f'Found {len(dirs)} migration directories')

          for d in dirs:
              name = os.path.basename(d.rstrip('/'))
              sql_file = os.path.join(d, 'migration.sql')
              if not os.path.isfile(sql_file):
                  continue

              print(f'Applying migration: {name}')
              with open(sql_file, 'r') as f:
                  sql = f.read()

              payload = json.dumps({'sql': sql, 'migrationName': name})

              # Write payload to temp file to avoid shell escaping issues
              with open('/tmp/migration-payload.json', 'w') as f:
                  f.write(payload)

              result = subprocess.run([
                  'aws', 'lambda', 'invoke',
                  '--function-name', lambda_name,
                  '--region', region,
                  '--payload', 'fileb:///tmp/migration-payload.json',
                  '/tmp/migration-result.json'
              ], capture_output=True, text=True)

              if os.path.isfile('/tmp/migration-result.json'):
                  with open('/tmp/migration-result.json', 'r') as f:
                      raw = f.read()
                  try:
                      resp = json.loads(raw)
                      body = json.loads(resp.get('body', '{}'))
                      ok = body.get('ok', 0)
                      skipped = body.get('skipped', 0)
                      errors = body.get('errors', 0)
                      print(f'  OK: {ok} | Skipped: {skipped} | Errors: {errors}')
                      if errors > 0:
                          for e in body.get('errorDetails', []):
                              print(f'    Error: {e}')
                  except Exception as e:
                      print(f'  Result: {raw[:500]}')
              else:
                  print(f'  No result file. stderr: {result.stderr[:300]}')

          print('✅ Migration step complete')
          "
        env:
          AWS_REGION: us-east-2
          MIGRATION_LAMBDA_NAME: ${{ steps.env.outputs.tf_env == 'dev' && 'gg-erp-dev' || 'gg-erp-prod' }}-run-schema-migration
        continue-on-error: true

      - name: Seed inventory master (opt-in)
        # Run only when the workflow is triggered manually with the `seed_inventory_master` flag.
        # The Aurora DB is in a private VPC, so this step invokes the `seed-inventory-master`
        # Lambda (in-VPC) rather than trying to reach the DB from the runner.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_inventory_master == true }}
        run: |
          echo "Invoking seed-inventory-master Lambda for ${{ steps.env.outputs.tf_env }}"
          LAMBDA_NAME="${{ steps.env.outputs.tf_env == 'dev' && 'gg-erp-dev' || 'gg-erp-prod' }}-seed-inventory-master"
          aws lambda invoke \
            --function-name "$LAMBDA_NAME" \
            --region us-east-2 \
            --payload '{"source":"cd"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/seed-result.json
          cat /tmp/seed-result.json
        env:
          AWS_REGION: us-east-2
        continue-on-error: true

      - name: Smoke test - Health check
        run: |
          API_URL=$(cd infra/terraform/envs/${{ steps.env.outputs.tf_env }} && terraform output -raw api_gateway_url 2>/dev/null || echo "")
          if [ -z "$API_URL" ]; then
            echo "⚠️  API URL not available from Terraform output, skipping smoke test"
            exit 0
          fi
          echo "Running smoke test against: $API_URL"
          # Test unauthenticated endpoint returns 401 (proves API Gateway + Lambda are working)
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/auth/me" 2>&1)
          echo "GET /auth/me (no token) → $RESPONSE"
          if [[ "$RESPONSE" == "401" ]]; then
            echo "✅ Smoke test passed — API is responding"
          else
            echo "⚠️  Unexpected status $RESPONSE (expected 401)"
          fi
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}

      - name: Deployment summary
        if: always()
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "N/A")
          WEB_URL=$(terraform output -raw web_url 2>/dev/null || echo "N/A")
          FLOOR_URL=$(terraform output -raw floor_tech_url 2>/dev/null || echo "N/A")
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | $API_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Dashboard | $WEB_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Floor Tech | $FLOOR_URL |" >> $GITHUB_STEP_SUMMARY
