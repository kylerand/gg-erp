name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main

jobs:
  pre_deploy_gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DB_DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma schema integrity
        run: npm run db:schema:check

      - name: Prisma migration integrity
        run: npm run db:migrations:check

      - name: Bootstrap scaffold integrity
        run: npm run bootstrap:check

  deploy:
    needs: pre_deploy_gates
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write   # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:schema:check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Build Lambda artifacts
        run: npm run build:lambdas

      - name: Package Lambda artifacts
        run: npm run package:lambdas

      - name: Determine environment
        id: env
        run: |
          # Manual dispatch: use selected environment
          # Push to main: default to dev (change to prod when ready for production)
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [[ "$ENV" == "prod" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "name_prefix=gg-erp-prod" >> $GITHUB_OUTPUT
            echo "tf_env=prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
            echo "name_prefix=gg-erp-dev" >> $GITHUB_OUTPUT
            echo "tf_env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Upload Lambda artifacts to S3
        run: |
          for zipfile in apps/api/dist/*-lambda.zip; do
            name=$(basename "$zipfile" .zip)
            aws s3 cp "$zipfile" "s3://${{ steps.env.outputs.name_prefix }}-lambda-artifacts/lambdas/${name}.zip"
            echo "✓ Uploaded ${name}.zip"
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.4.6'

      - name: Terraform Init
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform init
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}

      - name: Terraform Plan
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform plan -out=tfplan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}
          TF_VAR_work_orders_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/work-orders-lambda.zip"
          TF_VAR_customers_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/customers-lambda.zip"
          TF_VAR_inventory_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/inventory-lambda.zip"
          TF_VAR_tickets_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/tickets-lambda.zip"
          TF_VAR_attachments_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/attachments-lambda.zip"
          TF_VAR_sop_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/sop-lambda.zip"
          TF_VAR_accounting_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/accounting-lambda.zip"
          TF_VAR_migration_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/migration-lambda.zip"
          TF_VAR_identity_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/identity-lambda.zip"
          TF_VAR_qb_client_id: ${{ secrets.QB_CLIENT_ID }}
          TF_VAR_qb_client_secret: ${{ secrets.QB_CLIENT_SECRET }}
          TF_VAR_qb_redirect_uri: ${{ vars.QB_REDIRECT_URI || '' }}
          TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
          TF_VAR_repository_url: "https://github.com/${{ github.repository }}"

      - name: Terraform Apply
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}
          TF_VAR_work_orders_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/work-orders-lambda.zip"
          TF_VAR_customers_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/customers-lambda.zip"
          TF_VAR_inventory_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/inventory-lambda.zip"
          TF_VAR_tickets_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/tickets-lambda.zip"
          TF_VAR_attachments_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/attachments-lambda.zip"
          TF_VAR_sop_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/sop-lambda.zip"
          TF_VAR_accounting_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/accounting-lambda.zip"
          TF_VAR_migration_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/migration-lambda.zip"
          TF_VAR_identity_lambda_zip_path: "${{ github.workspace }}/apps/api/dist/identity-lambda.zip"
          TF_VAR_qb_client_id: ${{ secrets.QB_CLIENT_ID }}
          TF_VAR_qb_client_secret: ${{ secrets.QB_CLIENT_SECRET }}
          TF_VAR_qb_redirect_uri: ${{ vars.QB_REDIRECT_URI || '' }}
          TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
          TF_VAR_repository_url: "https://github.com/${{ github.repository }}"

      - name: Run database migrations
        run: |
          npm run db:deploy || echo "⚠️  Database migration failed (likely VPC connectivity). Migrations should be run via Lambda or bastion."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

      - name: Smoke test - Health check
        run: |
          API_URL=$(cd infra/terraform/envs/${{ steps.env.outputs.tf_env }} && terraform output -raw api_gateway_url 2>/dev/null || echo "")
          if [ -z "$API_URL" ]; then
            echo "⚠️  API URL not available from Terraform output, skipping smoke test"
            exit 0
          fi
          echo "Running smoke test against: $API_URL"
          # Test unauthenticated endpoint returns 401 (proves API Gateway + Lambda are working)
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/auth/me" 2>&1)
          echo "GET /auth/me (no token) → $RESPONSE"
          if [[ "$RESPONSE" == "401" ]]; then
            echo "✅ Smoke test passed — API is responding"
          else
            echo "⚠️  Unexpected status $RESPONSE (expected 401)"
          fi
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
          TF_VAR_name_prefix: ${{ steps.env.outputs.name_prefix }}

      - name: Deployment summary
        if: always()
        working-directory: infra/terraform/envs/${{ steps.env.outputs.tf_env }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "N/A")
          WEB_URL=$(terraform output -raw web_url 2>/dev/null || echo "N/A")
          FLOOR_URL=$(terraform output -raw floor_tech_url 2>/dev/null || echo "N/A")
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | $API_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Dashboard | $WEB_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Floor Tech | $FLOOR_URL |" >> $GITHUB_STEP_SUMMARY
